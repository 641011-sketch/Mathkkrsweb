<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarOptima - คำนวณมุมแผงโซลาร์</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #7c3aed;
            --secondary: #a855f7;
            --accent: #c084fc;
            --dark: #1e1b4b;
            --light: #f3e8ff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #4c1d95 0%, #6b21a8 50%, #7e22ce 100%);
            color: #f3e8ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(30, 27, 75, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            padding: 40px 35px;
            max-width: 720px;
            width: 100%;
            border: 1px solid rgba(192, 132, 252, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .sun { font-size: 72px; margin-bottom: 12px; display: block; }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(90deg, #c084fc, #e0bbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #d8b4fe;
            font-size: 18px;
        }
        
        .input-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            color: #e0bbff;
            font-size: 18px;
            font-weight: 500;
        }
        
        select, input {
            width: 100%;
            padding: 18px 20px;
            font-size: 18px;
            border: 2px solid rgba(192, 132, 252, 0.5);
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: all 0.3s;
        }
        
        select:focus, input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 0 4px rgba(192, 132, 252, 0.2);
            outline: none;
        }
        
        button {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #a855f7, #c084fc);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 25px rgba(168, 85, 247, 0.4);
        }
        
        .result {
            margin-top: 30px;
            padding: 30px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            border: 1px solid rgba(192, 132, 252, 0.4);
            display: none;
        }
        
        .result.show { display: block; }
        
        .result h2 {
            text-align: center;
            color: #e0bbff;
            margin-bottom: 25px;
        }
        
        .result p {
            font-size: 19px;
            margin: 18px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .value {
            color: #ddd6fe;
            font-weight: 700;
        }
        
        .footer {
            text-align: center;
            margin-top: 35px;
            font-size: 14px;
            color: #c4b5fd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="sun">☀️</span>
            <h1>เครื่องคำนวณมุมแผงโซลาร์เซลล์</h1>
            <p class="subtitle">SolarOptima — ทันสมัย • แม่นยำ • ใช้งานง่าย</p>
        </div>

        <div class="input-group">
            <label>เลือกจังหวัด</label>
            <select id="province" onchange="document.getElementById('latitude').value = this.value">
                <option value="16.5">กำแพงเพชร</option>
                <option value="13.75">กรุงเทพมหานคร</option>
                <option value="18.79">เชียงใหม่</option>
                <option value="16.43">ขอนแก่น</option>
                <option value="14.97">นครราชสีมา</option>
                <option value="9.13">ภูเก็ต</option>
                <option value="7.88">สงขลา</option>
                <option value="15.0">สุพรรณบุรี</option>
                <option value="17.0">พิษณุโลก</option>
                <option value="19.9">เชียงราย</option>
                <option value="12.0">ชลบุรี</option>
                <option value="15.5">นครสวรรค์</option>
                <option value="14.5">ลพบุรี</option>
                <option value="8.43">กระบี่</option>
                <option value="13.36">สมุทรปราการ</option>
            </select>
        </div>

        <div class="input-group">
            <label>หรือใส่ละติจูดเอง (Latitude)</label>
            <input type="number" id="latitude" value="16.5" step="0.01">
        </div>

        <button onclick="calculate()">คำนวณมุมแผงโซลาร์เซลล์วันนี้</button>

        <div id="result" class="result">
            <h2>ผลการคำนวณ</h2>
            <p><span>ละติจูด</span> <span id="lat" class="value"></span></p>
            <p><span>มุม Declination</span> <span id="dec" class="value"></span></p>
            <p><span>มุมสูงดวงอาทิตย์</span> <span id="alt" class="value"></span></p>
            <p><span>มุมติดตั้งแผงแนะนำ</span> <span id="tilt" class="value"></span></p>
            <p><span>ทิศทางที่ควรหันแผง</span> <span class="value" style="color:#facc15;">ทิศใต้</span></p>
        </div>

        <div class="footer">
            อ้างอิงละติจูดจากเว็บพิกัด GPS (latlong.net) • สูตรมาตรฐานคณิตศาสตร์พลังงานแสงอาทิตย์
        </div>
    </div>

    <script>
        function calculate() {
            let lat = parseFloat(document.getElementById('latitude').value);
            const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
            const dec = 23.45 * Math.sin(2 * Math.PI / 365 * (284 + dayOfYear));
            const alt = 90 - Math.abs(lat - dec);
            const tilt = Math.max(0, Math.min(90, 90 - alt));

            document.getElementById('lat').textContent = lat.toFixed(2) + "°";
            document.getElementById('dec').textContent = dec.toFixed(2) + "°";
            document.getElementById('alt').textContent = alt.toFixed(2) + "°";
            document.getElementById('tilt').textContent = tilt.toFixed(1) + "°";
            document.getElementById('result').classList.add('show');
        }
        window.onload = calculate;
    </script>
</body>
</html>
